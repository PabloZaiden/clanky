<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <link rel="icon" href="./favicon.ico" sizes="any" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="icon" type="image/png" sizes="96x96" href="./favicon-96x96.png" />
    <link rel="apple-touch-icon" href="./apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="57x57" href="./apple-touch-icon-57x57.png" />
    <link rel="apple-touch-icon" sizes="72x72" href="./apple-touch-icon-72x72.png" />
    <link rel="apple-touch-icon" sizes="76x76" href="./apple-touch-icon-76x76.png" />
    <link rel="apple-touch-icon" sizes="114x114" href="./apple-touch-icon-114x114.png" />
    <link rel="apple-touch-icon" sizes="120x120" href="./apple-touch-icon-120x120.png" />
    <link rel="apple-touch-icon" sizes="144x144" href="./apple-touch-icon-144x144.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="./apple-touch-icon-152x152.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="./apple-touch-icon-167x167.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon-180x180.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Clanky" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#242424" />
    <script>
      document.head.insertAdjacentHTML("beforeend", '<link rel="manifest" href="/site.webmanifest" />');
    </script>
    <script>
      (() => {
        const storageKey = "clanky.themePreference";
        const darkClass = "dark";
        const defaultPreference = "system";
        const root = document.documentElement;
        const metaThemeColor = document.querySelector('meta[name="theme-color"]');
        let preference = defaultPreference;

        try {
          const storedPreference = window.localStorage.getItem(storageKey);
          if (storedPreference === "light" || storedPreference === "dark" || storedPreference === "system") {
            preference = storedPreference;
          }
        } catch {}

        const systemPrefersDark = typeof window.matchMedia === "function"
          && window.matchMedia("(prefers-color-scheme: dark)").matches;
        const resolvedTheme = preference === "system"
          ? (systemPrefersDark ? "dark" : "light")
          : preference;

        root.classList.toggle(darkClass, resolvedTheme === "dark");
        root.style.colorScheme = resolvedTheme;
        root.dataset.themePreference = preference;
        root.dataset.themeResolved = resolvedTheme;

        if (metaThemeColor instanceof HTMLMetaElement) {
          metaThemeColor.content = resolvedTheme === "dark" ? "#171717" : "#f3f4f6";
        }
      })();
    </script>
    <title>Clanky</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./frontend.tsx"></script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <link rel="icon" type="image/png" sizes="32x32" href="./favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="./favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png" />
    <link rel="manifest" href="./site.webmanifest" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Clanky" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#242424" />
    <script>
      (() => {
        const storageKey = "clanky.themePreference";
        const darkClass = "dark";
        const defaultPreference = "system";
        const root = document.documentElement;
        const metaThemeColor = document.querySelector('meta[name="theme-color"]');
        let preference = defaultPreference;

        try {
          const storedPreference = window.localStorage.getItem(storageKey);
          if (storedPreference === "light" || storedPreference === "dark" || storedPreference === "system") {
            preference = storedPreference;
          }
        } catch {}

        const systemPrefersDark = typeof window.matchMedia === "function"
          && window.matchMedia("(prefers-color-scheme: dark)").matches;
        const resolvedTheme = preference === "system"
          ? (systemPrefersDark ? "dark" : "light")
          : preference;

        root.classList.toggle(darkClass, resolvedTheme === "dark");
        root.style.colorScheme = resolvedTheme;
        root.dataset.themePreference = preference;
        root.dataset.themeResolved = resolvedTheme;

        if (metaThemeColor instanceof HTMLMetaElement) {
          metaThemeColor.content = resolvedTheme === "dark" ? "#171717" : "#f3f4f6";
        }
      })();
    </script>
    <title>Clanky</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./frontend.tsx"></script>
  </body>
</html>

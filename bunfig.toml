[install]
exact = true
minimumReleaseAge = 259200 # 3 days in seconds — avoids freshly published malicious packages
# Keep this minimal: only first-party packages that Clanky intentionally upgrades before
# the global safety window elapses should bypass minimumReleaseAge.
minimumReleaseAgeExcludes = [
  "@pablozaiden/installer",
  "@pablozaiden/webapp", # First-party framework upgraded in lockstep with Clanky compatibility work.
]

[serve.static]
plugins = ["bun-plugin-tailwind"]
env = "BUN_PUBLIC_*"

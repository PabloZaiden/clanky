name: Build and Release Binaries

on:
  release:
    types:
      - published

jobs:
  binaries:
    uses: pablozaiden/installer/.github/workflows/reusable-binary-release.yml@2e28bc9fbf69385ac5172e526a1268f72db02363
    permissions:
      contents: write
    with:
      prebuild_command: bun run build
      binaries: |
        [
          {
            "name": "clanky",
            "asset_prefix": "clanky",
            "build_command": "bun --cwd apps/server src/build.ts --target=$BUN_TARGET",
            "output_path": "apps/server/dist/clanky-$RELEASE_TARGET"
          },
          {
            "name": "clanky-cli",
            "asset_prefix": "clanky-cli",
            "build_command": "bun --cwd apps/cli src/build.ts --target=$BUN_TARGET",
            "output_path": "apps/cli/dist/clanky-cli-$RELEASE_TARGET"
          }
        ]

name: Build and Release Binaries

on:
  release:
    types:
      - published

jobs:
  build-binaries:
    name: Build ${{ matrix.target.target }}
    runs-on: ${{ matrix.target.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        target:
          - os: ubuntu-latest
            target: linux-x64
            bun_target: bun-linux-x64
          - os: ubuntu-latest
            target: linux-arm64
            bun_target: bun-linux-arm64
          - os: macos-latest
            target: darwin-x64
            bun_target: bun-darwin-x64
          - os: macos-latest
            target: darwin-arm64
            bun_target: bun-darwin-arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Update package.json version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          jq --arg v "$VERSION" '.version = $v' package.json > package.json.tmp
          mv package.json.tmp package.json

      - name: Run prebuild command
        run: bun run build

      - name: Build and stage release assets
        env:
          TAG: ${{ github.ref_name }}
          VERSION: ${{ github.ref_name }}
          RELEASE_TARGET: ${{ matrix.target.target }}
          BUN_TARGET: ${{ matrix.target.bun_target }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          export TAG VERSION RELEASE_TARGET BUN_TARGET
          mkdir -p dist/release-assets

          cd apps/server
          bun src/build.ts --target="$BUN_TARGET"
          cd ../..
          cp "apps/server/dist/ralpher-$RELEASE_TARGET" "dist/release-assets/ralpher-$TAG-$RELEASE_TARGET"
          chmod +x "dist/release-assets/ralpher-$TAG-$RELEASE_TARGET"

          cd apps/cli
          bun src/build.ts --target="$BUN_TARGET"
          cd ../..
          cp "apps/cli/dist/ralpher-cli-$RELEASE_TARGET" "dist/release-assets/ralpher-cli-$TAG-$RELEASE_TARGET"
          chmod +x "dist/release-assets/ralpher-cli-$TAG-$RELEASE_TARGET"

          (
            cd dist/release-assets
            shasum -a 256 "ralpher-$TAG-$RELEASE_TARGET" > "ralpher-$TAG-$RELEASE_TARGET.sha256"
            shasum -a 256 "ralpher-cli-$TAG-$RELEASE_TARGET" > "ralpher-cli-$TAG-$RELEASE_TARGET.sha256"
          )

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: release-assets-${{ matrix.target.target }}
          path: dist/release-assets/*
          if-no-files-found: error

  publish-release-assets:
    name: Publish release assets
    runs-on: ubuntu-latest
    needs: build-binaries
    permissions:
      contents: write

    steps:
      - name: Download release asset artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: release-assets-*
          path: dist/release-assets
          merge-multiple: true

      - name: Upload assets to release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: gh release upload "${{ github.ref_name }}" dist/release-assets/* --clobber --repo "$GH_REPO"

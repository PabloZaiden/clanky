name: Build and Push Docker Image (Main Branch)

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  # Toggle platforms: 'linux/amd64' for fast builds, 'linux/amd64,linux/arm64' for full cross-build
  BUILD_PLATFORMS: linux/amd64

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Resolve build version
        uses: pablozaiden/installer/.github/actions/resolve-version@3c54a204d9285a824c4905fd4a46886f2a2e9763 # installer #7
        with:
          mode: main
          github_token: ${{ github.token }}
          update_package_version: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=main

      - name: Build and push Docker image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          file: Dockerfile
          push: true
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: ${{ env.BUILD_PLATFORMS }}

      - name: Test container healthcheck
        run: |
          # Run the container in the background
          docker run -d --name clanky-test -p 8080:8080 ${{ steps.meta.outputs.tags }}

          # Wait for the container to be ready and healthy
          echo "Waiting for container to become healthy..."
          for i in $(seq 1 30); do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' clanky-test 2>/dev/null || echo "starting")
            if [ "$STATUS" = "healthy" ]; then
              echo "Container is healthy!"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "Container failed to become healthy within 60s"
              echo "Container status: $STATUS"
              echo "Container logs:"
              docker logs clanky-test
              docker rm -f clanky-test
              exit 1
            fi
            sleep 2
          done

          # Verify the health endpoint directly
          curl -f http://localhost:8080/api/health

          # Cleanup
          docker rm -f clanky-test

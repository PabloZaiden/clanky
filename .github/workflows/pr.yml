name: Pull Request

on:
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Run tests
        run: bun run test

  smoke-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Smoke test app startup
        run: |
          set -e
          rm -f /tmp/ralpher-pr-smoke.log /tmp/ralpher-pr-index.html /tmp/ralpher-pr-app.css
          RALPHER_PORT=3018 bun run dev > /tmp/ralpher-pr-smoke.log 2>&1 &
          APP_PID=$!
          trap 'kill $APP_PID 2>/dev/null || true' EXIT
          sleep 2

          if ! kill -0 "$APP_PID" 2>/dev/null; then
            echo "Ralpher exited during startup"
            cat /tmp/ralpher-pr-smoke.log
            exit 1
          fi

          curl -v --fail http://127.0.0.1:3018/api/health
          curl -v --fail http://127.0.0.1:3018/ -o /tmp/ralpher-pr-index.html
          css_path=$(grep -oE '/[^" ]+\.css' /tmp/ralpher-pr-index.html | head -n1)
          test -n "$css_path"
          curl -v --fail "http://127.0.0.1:3018$css_path" -o /tmp/ralpher-pr-app.css

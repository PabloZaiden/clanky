name: Pull Request

on:
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Setup Node.js 24
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24.x

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Run tests
        run: bun run test

  smoke-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Smoke test dev server
        run: |
          set -e
          CLANKY_DISABLE_PASSKEY=1 CLANKY_HOST=127.0.0.1 CLANKY_PORT=3017 CLANKY_DATA_DIR="$(mktemp -d)" bun run dev > /tmp/clanky-pr-dev-smoke.log 2>&1 &
          APP_PID=$!
          trap 'kill "$APP_PID" 2>/dev/null || true' EXIT

          for attempt in $(seq 1 30); do
            if ! kill -0 "$APP_PID" 2>/dev/null; then
              echo "Clanky dev server exited during startup"
              cat /tmp/clanky-pr-dev-smoke.log
              exit 1
            fi
            if curl --fail --silent --show-error http://127.0.0.1:3017/api/health; then
              break
            fi
            if [ "$attempt" -eq 30 ]; then
              echo "Clanky dev server did not become ready"
              cat /tmp/clanky-pr-dev-smoke.log
              exit 1
            fi
            sleep 1
          done

          HTML=$(curl -fsS -D /tmp/clanky-pr-dev-root-headers http://127.0.0.1:3017/)
          grep -qi '^content-type: text/html' /tmp/clanky-pr-dev-root-headers
          SCRIPTS=$(printf '%s' "$HTML" | grep -oE 'src="[^"]+\.js"' | sed 's/^src="//; s/"$//' || true)
          CSS=$(printf '%s' "$HTML" | grep -oE 'href="[^"]+\.css"' | sed 's/^href="//; s/"$//' || true)
          test -n "$SCRIPTS"
          test -n "$CSS"
          : > /tmp/clanky-pr-dev-js-headers
          for JS in $SCRIPTS; do
            JS="${JS#./}"
            JS="${JS#/}"
            curl -fsS -D /tmp/clanky-pr-dev-js-headers "http://127.0.0.1:3017/$JS" >/dev/null
            grep -qi '^content-type: .*javascript' /tmp/clanky-pr-dev-js-headers
          done
          for CSS_PATH in $CSS; do
            CSS_PATH="${CSS_PATH#./}"
            CSS_PATH="${CSS_PATH#/}"
            curl -fsS -D /tmp/clanky-pr-dev-css-headers "http://127.0.0.1:3017/$CSS_PATH" >/dev/null
            grep -qi '^content-type: text/css' /tmp/clanky-pr-dev-css-headers
          done
          curl -fsS -D /tmp/clanky-pr-dev-manifest-headers http://127.0.0.1:3017/site.webmanifest >/dev/null
          curl -fsS -D /tmp/clanky-pr-dev-icon-headers http://127.0.0.1:3017/webapp-icon-1.png >/dev/null
          curl -fsS -D /tmp/clanky-pr-dev-apple-icon-headers http://127.0.0.1:3017/webapp-apple-touch-icon.png >/dev/null
          grep -qi '^content-type: application/manifest+json' /tmp/clanky-pr-dev-manifest-headers
          grep -qi '^content-type: image/png' /tmp/clanky-pr-dev-icon-headers
          grep -qi '^content-type: image/png' /tmp/clanky-pr-dev-apple-icon-headers

      - name: Build binary
        run: bun run build

      - name: Smoke test binary startup
        run: |
          set -e
          rm -f /tmp/clanky-pr-binary-smoke.log
          ./dist/clanky --help > /tmp/clanky-pr-help.log
          grep -q "Usage:" /tmp/clanky-pr-help.log
          if ./dist/clanky > /tmp/clanky-pr-empty.log 2>&1; then
            echo "Plain clanky should print help and exit non-zero"
            cat /tmp/clanky-pr-empty.log
            exit 1
          fi
          grep -q "Usage:" /tmp/clanky-pr-empty.log
          CLANKY_DISABLE_PASSKEY=1 CLANKY_HOST=127.0.0.1 CLANKY_PORT=3018 CLANKY_DATA_DIR="$(mktemp -d)" ./dist/clanky serve > /tmp/clanky-pr-binary-smoke.log 2>&1 &
          APP_PID=$!
          trap 'kill "$APP_PID" 2>/dev/null || true' EXIT

          for attempt in $(seq 1 30); do
            if ! kill -0 "$APP_PID" 2>/dev/null; then
              echo "Clanky exited during startup"
              cat /tmp/clanky-pr-binary-smoke.log
              exit 1
            fi
            if curl --fail --silent --show-error http://127.0.0.1:3018/api/health; then
              break
            fi
            if [ "$attempt" -eq 30 ]; then
              echo "Clanky did not become ready"
              cat /tmp/clanky-pr-binary-smoke.log
              exit 1
            fi
            sleep 1
          done

          HTML=$(curl -fsS -D /tmp/clanky-pr-root-headers http://127.0.0.1:3018/)
          grep -qi '^content-type: text/html' /tmp/clanky-pr-root-headers
          SCRIPTS=$(printf '%s' "$HTML" | grep -oE 'src="[^"]+\.js"' | sed 's/^src="//; s/"$//' || true)
          CSS=$(printf '%s' "$HTML" | grep -oE 'href="[^"]+\.css"' | sed 's/^href="//; s/"$//' || true)
          test -n "$SCRIPTS"
          test -n "$CSS"
          : > /tmp/clanky-pr-js-headers
          for JS in $SCRIPTS; do
            JS="${JS#./}"
            JS="${JS#/}"
            curl -fsS -D /tmp/clanky-pr-js-headers "http://127.0.0.1:3018/$JS" >/dev/null
            grep -qi '^content-type: .*javascript' /tmp/clanky-pr-js-headers
          done
          for CSS_PATH in $CSS; do
            CSS_PATH="${CSS_PATH#./}"
            CSS_PATH="${CSS_PATH#/}"
            curl -fsS -D /tmp/clanky-pr-css-headers "http://127.0.0.1:3018/$CSS_PATH" >/dev/null
            grep -qi '^content-type: text/css' /tmp/clanky-pr-css-headers
          done
          curl -fsS -D /tmp/clanky-pr-manifest-headers http://127.0.0.1:3018/site.webmanifest >/dev/null
          curl -fsS -D /tmp/clanky-pr-icon-headers http://127.0.0.1:3018/webapp-icon-1.png >/dev/null
          curl -fsS -D /tmp/clanky-pr-apple-icon-headers http://127.0.0.1:3018/webapp-apple-touch-icon.png >/dev/null
          grep -qi '^content-type: application/manifest+json' /tmp/clanky-pr-manifest-headers
          grep -qi '^content-type: image/png' /tmp/clanky-pr-icon-headers
          grep -qi '^content-type: image/png' /tmp/clanky-pr-apple-icon-headers

          FIRST_SCRIPT=$(printf '%s\n' "$SCRIPTS" | sed -n '1p')
          SECOND_SCRIPT=$(printf '%s\n' "$SCRIPTS" | sed -n '2p')
          test "$FIRST_SCRIPT" = "/webapp-compiled/webapp-renderer-prelude.js"
          test "$SECOND_SCRIPT" = "/webapp-compiled/webapp-client-entry.js"

      - name: Smoke test Docker image
        run: |
          set -e
          docker build -t clanky-pr-smoke .
          docker run -d --name clanky-pr-smoke -p 3019:8080 \
            -e CLANKY_DISABLE_PASSKEY=1 \
            -e CLANKY_DATA_DIR=/app/data \
            clanky-pr-smoke
          trap 'docker rm -f clanky-pr-smoke 2>/dev/null || true' EXIT

          docker inspect --format='{{range .Config.Env}}{{println .}}{{end}}' clanky-pr-smoke \
            | grep -Fx 'CLANKY_TRUST_PROXY=true'
          docker inspect --format='{{range .Config.Env}}{{println .}}{{end}}' clanky-pr-smoke \
            | grep -Fx 'CLANKY_TRUST_PROXY_HEADERS=proto,host,prefix'
          docker inspect --format='{{range .Config.Env}}{{println .}}{{end}}' clanky-pr-smoke \
            | grep -Fx 'CLANKY_TRUST_PROXY_CHAIN=first'

          for attempt in $(seq 1 45); do
            status=$(docker inspect --format='{{.State.Health.Status}}' clanky-pr-smoke 2>/dev/null || echo "starting")
            if [ "$status" = "healthy" ]; then
              break
            fi
            if [ "$status" = "unhealthy" ]; then
              echo "Docker smoke container became unhealthy"
              docker logs clanky-pr-smoke
              exit 1
            fi
            if [ "$attempt" -eq 45 ]; then
              echo "Docker smoke container did not become healthy"
              docker logs clanky-pr-smoke
              exit 1
            fi
            sleep 2
          done

          HTML=$(curl -fsS -D /tmp/clanky-pr-docker-root-headers http://127.0.0.1:3019/)
          grep -qi '^content-type: text/html' /tmp/clanky-pr-docker-root-headers
          SCRIPTS=$(printf '%s' "$HTML" | grep -oE 'src="[^"]+\.js"' | sed 's/^src="//; s/"$//' || true)
          CSS=$(printf '%s' "$HTML" | grep -oE 'href="[^"]+\.css"' | sed 's/^href="//; s/"$//' || true)
          test -n "$SCRIPTS"
          test -n "$CSS"
          : > /tmp/clanky-pr-docker-js-headers
          for JS in $SCRIPTS; do
            JS="${JS#./}"
            JS="${JS#/}"
            curl -fsS -D /tmp/clanky-pr-docker-js-headers "http://127.0.0.1:3019/$JS" >/dev/null
            grep -qi '^content-type: .*javascript' /tmp/clanky-pr-docker-js-headers
          done
          for CSS_PATH in $CSS; do
            CSS_PATH="${CSS_PATH#./}"
            CSS_PATH="${CSS_PATH#/}"
            curl -fsS -D /tmp/clanky-pr-docker-css-headers "http://127.0.0.1:3019/$CSS_PATH" >/dev/null
            grep -qi '^content-type: text/css' /tmp/clanky-pr-docker-css-headers
          done
          curl -fsS -D /tmp/clanky-pr-docker-manifest-headers http://127.0.0.1:3019/site.webmanifest >/dev/null
          curl -fsS -D /tmp/clanky-pr-docker-icon-headers http://127.0.0.1:3019/webapp-icon-1.png >/dev/null
          curl -fsS -D /tmp/clanky-pr-docker-apple-icon-headers http://127.0.0.1:3019/webapp-apple-touch-icon.png >/dev/null
          grep -qi '^content-type: application/manifest+json' /tmp/clanky-pr-docker-manifest-headers
          grep -qi '^content-type: image/png' /tmp/clanky-pr-docker-icon-headers
          grep -qi '^content-type: image/png' /tmp/clanky-pr-docker-apple-icon-headers

          FIRST_SCRIPT=$(printf '%s\n' "$SCRIPTS" | sed -n '1p')
          SECOND_SCRIPT=$(printf '%s\n' "$SCRIPTS" | sed -n '2p')
          test "$FIRST_SCRIPT" = "/webapp-compiled/webapp-renderer-prelude.js"
          test "$SECOND_SCRIPT" = "/webapp-compiled/webapp-client-entry.js"
